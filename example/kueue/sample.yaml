apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: vgpu-manager-flavor
spec:
  nodeLabels:
    vgpu-manager: device-plugin
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: vgpu-manager-cluster-queue
spec:
  namespaceSelector: {}
  resourceGroups:
    - coveredResources:
        - nvidia.com/vgpu-number
        - nvidia.com/total-vgpu-cores
        - nvidia.com/total-vgpu-memory
      flavors:
        - name: vgpu-manager-flavor
          resources:
            - name: nvidia.com/vgpu-number
              nominalQuota: 20
            - name: nvidia.com/total-vgpu-cores
              nominalQuota: 600
            - name: nvidia.com/total-vgpu-memory
              nominalQuota: 20480
---
apiVersion: v1
kind: Namespace
metadata:
  name: kueue-test
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  name: vgpu-manager-queue
  namespace: kueue-test
spec:
  clusterQueue: vgpu-manager-cluster-queue
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-burn
  namespace: kueue-test
  labels:
    kueue.x-k8s.io/queue-name: vgpu-manager-queue
spec:
  replicas: 1
  selector:
    matchLabels:
      app-name: gpu-burn
  template:
    metadata:
      labels:
        app-name: gpu-burn
    spec:
      containers:
        - args:
            - while :; do /app/gpu_burn 300 || true; sleep 300; done
          command:
            - /bin/sh
            - -lc
          image: oguzpastirmaci/gpu-burn:latest
          imagePullPolicy: IfNotPresent
          name: main
          resources:
            limits:
              nvidia.com/vgpu-number: "2"        # requesting 2 vGPU instances
              nvidia.com/vgpu-cores: "30"        # 30 cores per vGPU
              nvidia.com/vgpu-memory: "1024"     # 1024 MiB per vGPU