{{- if .Values.webhook.enabled -}}
{{- if .Values.webhook.certManager.enabled -}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "vgpu-manager.webhook" . }}-cert
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/component: {{ include "vgpu-manager.webhook" . }}
    {{- include "vgpu-manager.labels" . | nindent 4 }}
spec:
  dnsNames:
    - {{ include "vgpu-manager.webhook" . }}.{{ .Release.Namespace }}.svc
    - {{ include "vgpu-manager.webhook" . }}.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: {{ include "vgpu-manager.webhook" . }}-issuer
  secretName: {{ include "vgpu-manager.webhook" . }}-secret
  duration: {{ printf "%dh" (mul .Values.webhook.certDuration 24) }}
  renewBefore: {{ printf "%dh" (mul .Values.webhook.certManager.certRenewBefore 24) }}
{{- else }}
{{- $webhookSvcName := include "vgpu-manager.webhook" . }}
{{- $webhookSvcAltNames := list (printf "%s.%s.svc" $webhookSvcName .Release.Namespace) (printf "%s.%s.svc.cluster.local" $webhookSvcName .Release.Namespace) }}
{{- $certName := printf "%s-cert" (include "vgpu-manager.webhook" .) }}
{{- $secretName := printf "%s-secret" (include "vgpu-manager.webhook" .) }}
{{- $duration := int .Values.webhook.certDuration }}
{{- /*
  Self-signed cert for the Helm-CLI path. A STABLE CA is persisted in the Secret
  and reused across upgrades (via lookup), so the webhook caBundle never changes —
  this avoids the caBundle/served-cert mismatch window under failurePolicy: Fail.
  Only the leaf (server) cert is re-issued on every upgrade to refresh its validity;
  the webhook server hot-reloads it (controller-runtime CertWatcher), no pod restart.
  All resources here are plain (non-hook) so `helm uninstall` removes them cleanly.
  NOTE: lookup returns nothing during `helm template`/--dry-run/client-side GitOps
  rendering; use the cert-manager path (webhook.certManager.enabled=true) for those.
*/ -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $ca := "" }}
{{- if and $existing $existing.data (index $existing.data "ca.crt") (index $existing.data "ca.key") }}
{{- $ca = buildCustomCert (index $existing.data "ca.crt") (index $existing.data "ca.key") }}
{{- else }}
{{- $ca = genCA $certName $duration }}
{{- end }}
{{- $cert := genSignedCert (printf "%s.%s" $webhookSvcName .Release.Namespace) nil $webhookSvcAltNames $duration $ca }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vgpu-manager.webhook" . }}-secret
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/component: {{ include "vgpu-manager.webhook" . }}
    {{- include "vgpu-manager.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  # ca.key is persisted so upgrades can reuse the same CA (stable caBundle).
  ca.crt: {{ $ca.Cert | b64enc }}
  ca.key: {{ $ca.Key | b64enc }}
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  labels:
    app.kubernetes.io/component: {{ include "vgpu-manager.webhook" . }}
    {{- include "vgpu-manager.labels" . | nindent 4 }}
  name: {{ include "vgpu-manager.webhook" . }}-mutate
webhooks:
  - admissionReviewVersions:
      - v1beta1
    clientConfig:
      caBundle: {{ $ca.Cert | b64enc }}
      service:
        name: {{ include "vgpu-manager.webhook" . }}
        namespace: {{ .Release.Namespace | quote }}
        path: /pods/mutate
        port: {{ .Values.webhook.commands.serverBindPort | default 9443 }}
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    matchPolicy: Equivalent
    name: mutatepod.vgpu-manager.io
    namespaceSelector:
      matchExpressions:
        - key: vgpu-manager.io/ignore-webhook
          operator: NotIn
          values:
            - "true"
        {{- if .Values.webhook.excludeNamespaces }}
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
          {{- toYaml .Values.webhook.excludeNamespaces | nindent 10 }}
        {{- end }}
    objectSelector:
      matchExpressions:
        - key: vgpu-manager.io/ignore-webhook
          operator: NotIn
          values:
            - "true"
    reinvocationPolicy: Never
    rules:
      - apiGroups:
          - ""
        apiVersions:
          - v1
        operations:
          - CREATE
        resources:
          - pods
        scope: '*'
    sideEffects: NoneOnDryRun
    timeoutSeconds: 10
{{- end }}
{{- end }}