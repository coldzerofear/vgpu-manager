{{- if .Values.scheduler.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vgpu-manager.scheduler" . }}-config
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/component: {{ include "vgpu-manager.scheduler" . }}
    {{- include "vgpu-manager.labels" . | nindent 4 }}
data:
  {{- if ge (regexReplaceAll "[^0-9]" .Capabilities.KubeVersion.Minor "" | int) 22 }}
  {{/* K8s >= 1.22: Use KubeSchedulerConfiguration API */}}
  config.yaml: |
    {{- if ge (regexReplaceAll "[^0-9]" .Capabilities.KubeVersion.Minor "" | int) 25}}
    apiVersion: kubescheduler.config.k8s.io/v1
    {{- else }}
    apiVersion: kubescheduler.config.k8s.io/v1beta2
    {{- end }}
    kind: KubeSchedulerConfiguration
    leaderElection:
      leaderElect: true
      resourceName: {{ .Values.scheduler.schedulerName | default "vgpu-scheduler" }}
      resourceNamespace: {{ .Release.Namespace | quote }}
    profiles:
    - schedulerName: {{ .Values.scheduler.schedulerName | default "vgpu-scheduler" }}
    extenders:
    {{- if .Values.scheduler.schedulerExtender.tls.enabled }}
    - urlPrefix: "https://127.0.0.1:{{ .Values.scheduler.schedulerExtender.commands.serverBindPort | default 3456 }}/scheduler"
      enableHTTPS: true
      tlsConfig:
        insecure: true
    {{- else }}
    - urlPrefix: "http://127.0.0.1:{{ .Values.scheduler.schedulerExtender.commands.serverBindPort | default 3456 }}/scheduler"
      enableHTTPS: false
    {{- end }}
      filterVerb: filter
      bindVerb: bind
      nodeCacheCapable: true
      weight: 1
      httpTimeout: 30s
      managedResources:
      - name: "{{ default "nvidia.com" .Values.globalDomain | trimSuffix "/" }}/vgpu-number"
        ignoredByScheduler: true
      - name: "{{ default "nvidia.com" .Values.globalDomain | trimSuffix "/" }}/vgpu-cores"
        ignoredByScheduler: true
      - name: "{{ default "nvidia.com" .Values.globalDomain | trimSuffix "/" }}/vgpu-memory"
        ignoredByScheduler: true
  {{- else }}
  {{/* K8s < 1.22: Use legacy Policy API */}}
  config.json: |
    {
      "kind": "Policy",
      "apiVersion": "v1",
      "extenders": [
        {
          {{- if .Values.scheduler.schedulerExtender.tls.enabled }}
          "urlPrefix": "https://127.0.0.1:{{ .Values.scheduler.schedulerExtender.commands.serverBindPort | default 3456 }}/scheduler",
          "enableHttps": true,
          "tlsConfig": {
            "insecure": true
          },
          {{- else }}
          "urlPrefix": "http://127.0.0.1:{{ .Values.scheduler.schedulerExtender.commands.serverBindPort | default 3456 }}/scheduler",
          "enableHttps": false,
          {{- end }}
          "filterVerb": "filter",
          "bindVerb": "bind",
          "weight": 1,
          "nodeCacheCapable": true,
          "httpTimeout": 30000000000,
          "managedResources": [
            {
              "name": "{{ default "nvidia.com" .Values.globalDomain | trimSuffix "/" }}/vgpu-number",
              "ignoredByScheduler": true
            },
            {
              "name": "{{ default "nvidia.com" .Values.globalDomain | trimSuffix "/" }}/vgpu-cores",
              "ignoredByScheduler": true
            },
            {
              "name": "{{ default "nvidia.com" .Values.globalDomain | trimSuffix "/" }}/vgpu-memory",
              "ignoredByScheduler": true
            }
          ],
          "ignoreable": false
        }
      ]
    }
  {{- end }}
{{- end }}