{{- $nc := .Values.devicePlugin.nodeConfig | default dict }}
{{- $dpCmds := .Values.devicePlugin.devicePlugin.commands }}
{{- $cdiEnabled := contains "cdi" ($dpCmds.deviceListStrategy | default "envvar") }}
{{- $cdiRoot := $dpCmds.cdiRoot | default "/var/run/cdi" }}
{{- /* A custom (non-"/") driver root is generated from inside the plugin container,
       so the host driver root must be mounted in. Flag defaults and mount host paths
       are kept in sync below. */ -}}
{{- $hostDriverRoot := .Values.devicePlugin.driverRoot | default "/" }}
{{- $managerRoot := .Values.devicePlugin.managerRoot | default "/etc/vgpu-manager" }}
{{- if .Values.devicePlugin.enabled -}}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "vgpu-manager.device-plugin" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/component: {{ include "vgpu-manager.device-plugin" . }}
    {{- include "vgpu-manager.labels" . | nindent 4 }}
spec:
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/component: {{ include "vgpu-manager.device-plugin" . }}
      {{- include "vgpu-manager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: {{ include "vgpu-manager.device-plugin" . }}
        vgpu-manager.io/ignore-webhook: "true"
        {{- include "vgpu-manager.selectorLabels" . | nindent 8 }}
        {{- with .Values.devicePlugin.labels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        device-plugin-config/checksum: {{ include (print $.Template.BasePath "/device-plugin/configmap.yaml") . | sha256sum }}
      {{- if .Values.devicePlugin.annotations }}
        {{- toYaml .Values.devicePlugin.annotations | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.devicePlugin.runtimeClassName }}
      runtimeClassName: {{ .Values.devicePlugin.runtimeClassName }}
      {{- end }}
      {{- include "vgpu-manager.imagePullSecrets" . | nindent 6 }}
      priorityClassName: system-node-critical
      {{- if .Values.devicePlugin.nodeSelector }}
      nodeSelector: {{ toYaml .Values.devicePlugin.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.devicePlugin.tolerations }}
      tolerations: {{ toYaml .Values.devicePlugin.tolerations | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "vgpu-manager.device-plugin" . }}
      terminationGracePeriodSeconds: {{ .Values.devicePlugin.terminationGracePeriodSeconds }}
      hostPID: true
      hostNetwork: {{ .Values.devicePlugin.hostNetwork }}
      restartPolicy: Always
      initContainers:
        - name: install
          command: ["/bin/bash", "-c", "/scripts/install_files.sh"]
          image: {{ include "vgpu-manager.fullimage" . }}
          imagePullPolicy: {{ .Values.imagePullPolicy | quote }}
          env:
            - name: HOST_MANAGER_DIR
              value: {{ $managerRoot | quote }}
          resources:
            requests:
              cpu: 10m
              memory: 15Mi
          securityContext:
            privileged: true
          volumeMounts:
            - name: manager-root
              mountPath: {{ $managerRoot | quote }}
              mountPropagation: Bidirectional
      containers:
        - name: device-plugin
          image: {{ include "vgpu-manager.fullimage" . }}
          imagePullPolicy: {{ .Values.imagePullPolicy | quote }}
          command:
            - device-plugin
            - --domain={{ (default "nvidia.com" .Values.globalDomain) | trimSuffix "/" }}
            - --kube-api-qps={{ .Values.devicePlugin.devicePlugin.commands.kubeApiQps | default 20 }}
            - --kube-api-burst={{ .Values.devicePlugin.devicePlugin.commands.kubeApiBurst | default 30 }}
            - --device-list-strategy={{ .Values.devicePlugin.devicePlugin.commands.deviceListStrategy | default "envvar" }}
            - --device-split-count={{ .Values.devicePlugin.devicePlugin.commands.deviceSplitCount | default 10 }}
            - --device-cores-scaling={{ .Values.devicePlugin.devicePlugin.commands.deviceCoresScaling | default 1.0 }}
            - --device-memory-scaling={{ .Values.devicePlugin.devicePlugin.commands.deviceMemoryScaling | default 1.0 }}
            - --device-memory-factor={{ .Values.devicePlugin.devicePlugin.commands.deviceMemoryFactor | default 1 }}
            - --pprof-bind-port={{ .Values.devicePlugin.devicePlugin.commands.pprofBindPort }}
            - --cgroup-driver={{ .Values.devicePlugin.cgroupDriver }}
            - --feature-gates={{ include "vgpu-manager.featureGates" .Values.devicePlugin.devicePlugin.commands.featureGates }}
            - --mofed-enabled={{ .Values.devicePlugin.devicePlugin.commands.mofedEnabled }}
            - --gds-enabled={{ .Values.devicePlugin.devicePlugin.commands.gdsEnabled }}
            - --open-kernel-modules={{ .Values.devicePlugin.devicePlugin.commands.openKernelModules }}
            - --mig-strategy={{ .Values.devicePlugin.devicePlugin.commands.migStrategy | default "mixed" }}
            {{- with $dpCmds.cdiAnnotationPrefix }}
            - --cdi-annotation-prefix={{ . }}
            {{- end }}
            - --host-driver-root={{ $hostDriverRoot }}
            - --container-driver-root=/driver-root
            {{- if $nc.yaml }}
            - --node-config-path=/config/nodeConfig.yaml
            {{- else if $nc.json }}
            - --node-config-path=/config/nodeConfig.json
            {{- end }}
            - --v={{ .Values.devicePlugin.devicePlugin.commands.logLevel }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: HOST_MANAGER_DIR
              value: {{ $managerRoot | quote }}
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_MIG_MONITOR_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: utility,compute
          {{- if .Values.devicePlugin.devicePlugin.env }}
            {{- toYaml .Values.devicePlugin.devicePlugin.env | nindent 12 }}
          {{- end }}
          {{- if gt (int .Values.devicePlugin.devicePlugin.commands.pprofBindPort) 0 }}
          ports:
            - name: pprof1
              containerPort: {{ .Values.devicePlugin.devicePlugin.commands.pprofBindPort }}
          {{- end }}
          securityContext: {{ toYaml .Values.devicePlugin.securityContext | nindent 12 }}
          resources: {{ toYaml .Values.devicePlugin.devicePlugin.resources | nindent 12 }}
          volumeMounts:
            - name: kubelet-root
              mountPath: /var/lib/kubelet
              readOnly: true
            - name: device-plugins
              mountPath: /var/lib/kubelet/device-plugins
              mountPropagation: Bidirectional
            - name: pod-resources
              mountPath: /var/lib/kubelet/pod-resources
              readOnly: true
            - name: manager-root
              mountPath: /etc/vgpu-manager
            - name: cgroup-root
              mountPath: /sys/fs/cgroup
              readOnly: true
            {{- if or $nc.yaml $nc.json }}
            - name: node-config
              mountPath: /config
              readOnly: true
            {{- end }}
            {{- if $cdiEnabled }}
            - name: cdi-root
              mountPath: /var/run/cdi
            {{- end }}
            # Host driver root mounted in so the CDI spec can be generated from it.
            - name: driver-root
              mountPath: /driver-root
              readOnly: true
        - name: device-monitor
          image: {{ include "vgpu-manager.fullimage" . }}
          imagePullPolicy: {{ .Values.imagePullPolicy | quote }}
          command:
            - device-monitor
            - --domain={{ (default "nvidia.com" .Values.globalDomain) | trimSuffix "/" }}
            - --kube-api-qps={{ .Values.devicePlugin.deviceMonitor.commands.kubeApiQps | default 20 }}
            - --kube-api-burst={{ .Values.devicePlugin.deviceMonitor.commands.kubeApiBurst | default 30 }}
            - --server-bind-port={{ .Values.devicePlugin.deviceMonitor.commands.serverBindPort | default 3456 }}
            - --pprof-bind-port={{ .Values.devicePlugin.deviceMonitor.commands.pprofBindPort }}
            - --cgroup-driver={{ .Values.devicePlugin.cgroupDriver }}
            - --feature-gates={{ include "vgpu-manager.featureGates" .Values.devicePlugin.deviceMonitor.commands.featureGates }}
            {{- if $nc.yaml }}
            - --node-config-path=/config/nodeConfig.yaml
            {{- else if $nc.json }}
            - --node-config-path=/config/nodeConfig.json
            {{- end }}
            - --enable-rbac={{ .Values.devicePlugin.deviceMonitor.commands.enableRBAC | default false }}
            {{- if .Values.devicePlugin.deviceMonitor.tls.enabled }}
            - --enable-tls=true
            - --tls-key-file=/tmp/k8s-webhook-server/serving-certs/tls.key
            - --tls-cert-file=/tmp/k8s-webhook-server/serving-certs/tls.crt
            - --cert-refresh-interval={{ .Values.devicePlugin.deviceMonitor.commands.certRefreshInterval | default 5 }}
            {{- end }}
            - --min-scrape-interval={{ .Values.devicePlugin.deviceMonitor.commands.minScrapeInterval | default 1 }}
            {{- if .Values.scheduler.enabled }}
            - --stuck-grace-period={{ .Values.scheduler.schedulerExtender.commands.stuckGracePeriod | default "30s" }}
            {{- end }}
            - --container-driver-root=/driver-root
            - --v={{ .Values.devicePlugin.deviceMonitor.commands.logLevel }}
          ports:
            - name: metrics
              containerPort: {{ .Values.devicePlugin.deviceMonitor.commands.serverBindPort | default 3456 }}
            {{- if gt (int .Values.devicePlugin.deviceMonitor.commands.pprofBindPort) 0 }}
            - name: pprof2
              containerPort: {{ .Values.devicePlugin.deviceMonitor.commands.pprofBindPort }}
            {{- end }}
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: NVIDIA_MIG_MONITOR_DEVICES
              value: all
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: utility,compute
          {{- if .Values.devicePlugin.deviceMonitor.env }}
            {{- toYaml .Values.devicePlugin.deviceMonitor.env | nindent 12 }}
          {{- end }}
          securityContext: {{ toYaml .Values.devicePlugin.securityContext | nindent 12 }}
          resources: {{ toYaml .Values.devicePlugin.deviceMonitor.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
              {{- if .Values.devicePlugin.deviceMonitor.tls.enabled }}
              scheme: HTTPS
              {{- else }}
              scheme: HTTP
              {{- end }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
              {{- if .Values.devicePlugin.deviceMonitor.tls.enabled }}
              scheme: HTTPS
              {{- else }}
              scheme: HTTP
              {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: kubelet-root
              mountPath: /var/lib/kubelet
              readOnly: true
            - name: pod-resources
              mountPath: /var/lib/kubelet/pod-resources
              readOnly: true
            - name: manager-root
              mountPath: /etc/vgpu-manager
            - name: cgroup-root
              mountPath: /sys/fs/cgroup
              readOnly: true
            {{- if or $nc.yaml $nc.json }}
            - name: node-config
              mountPath: /config
              readOnly: true
            {{- end }}
            {{- if .Values.devicePlugin.deviceMonitor.tls.enabled }}
            - name: cert-dir
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
            {{- end }}
            - name: driver-root
              mountPath: /driver-root
              readOnly: true
      volumes:
        - name: kubelet-root
          hostPath:
            path: {{ (default "/var/lib/kubelet" .Values.devicePlugin.kubeletRoot) | trimSuffix "/" }}
        - name: device-plugins
          hostPath:
            path: {{ (default "/var/lib/kubelet" .Values.devicePlugin.kubeletRoot) | trimSuffix "/" }}/device-plugins
        - name: pod-resources
          hostPath:
            path: {{ (default "/var/lib/kubelet" .Values.devicePlugin.kubeletRoot) | trimSuffix "/" }}/pod-resources
        - name: manager-root
          hostPath:
            path: {{ $managerRoot | quote }}
            type: DirectoryOrCreate
        - name: cgroup-root
          hostPath:
            path: /sys/fs/cgroup
        {{- if $cdiEnabled }}
        - name: cdi-root
          hostPath:
            path: {{ $cdiRoot | quote }}
            type: DirectoryOrCreate
        {{- end }}
        - name: driver-root
          hostPath:
            path: {{ $hostDriverRoot | quote }}
        {{- if or $nc.yaml $nc.json }}
        - name: node-config
          configMap:
            name: {{ include "vgpu-manager.device-plugin" . }}-config
        {{- end }}
        {{- if .Values.devicePlugin.deviceMonitor.tls.enabled }}
        - name: cert-dir
          secret:
            secretName: {{ include "vgpu-manager.device-plugin" . }}-secret
        {{- end }}
{{- end }}