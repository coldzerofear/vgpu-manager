{{- if and .Values.webhook.enabled .Values.webhook.certManager.enabled -}}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ include "vgpu-manager-dra-driver.webhook" . }}-issuer
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/component: {{ include "vgpu-manager-dra-driver.webhook" . }}
    {{- include "vgpu-manager-dra-driver.labels" . | nindent 4 }}
spec:
  selfSigned: {}
{{- end }}
